syntax = "proto3";

package panmail.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/gsoultan/panmail/api/panmail/v1;panmailv1";

message Suppression {
  string id = 1;
  string tenant_id = 2;
  string email = 3;
  string reason = 4;
  google.protobuf.Timestamp create_time = 5;
}
